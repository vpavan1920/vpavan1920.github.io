<!doctype html>

<head>
  {% include head.html %}
  {% include head/custom.html %}
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Pavan Laxmipathy Veluvali",
    "alternateName": [
      "V. Pavan Laxmipathy",
      "V Pavan Laxmipathy",
      "Pavan Laxmipathy",
      "Veluvali L. Pavan",
      "Pavan Veluvali"
    ],
    "url": "https://vpavan1920.github.io",
    "jobTitle": "Computational Materials Scientist",
    "affiliation": "Max Planck Institute for Dynamics of Complex Technical Systems"
  }
</script>
<style>
div {
  text-align: justify;
  text-justify: inter-word;
}
</style>
<script>
(function() {
  const path = window.location.pathname;
  const userAgent = navigator.userAgent;
  const referrer = document.referrer || "Direct";

  const isLocal =
    window.location.hostname === "localhost" ||
    window.location.hostname === "127.0.0.1";

  const isInternal =
    path.includes('_includes') ||
    path.includes('_sass') ||
    path.includes('_layouts');

  const isBot =
    /bot|googlebot|crawler|spider|robot|crawling|headless/i.test(userAgent);

  if (isLocal || isInternal || isBot) return;

  // Known bot/crawler IP prefixes (Tencent Cloud crawler subnet)
  const BOT_IP_PREFIXES = [
    '43.173.'
  ];

  function isBotIP(ip) {
    return BOT_IP_PREFIXES.some(prefix => ip.startsWith(prefix));
  }

  // Known bot/crawler ASNs / orgs
  const BOT_ORGS = [
    'tencent',
    'alibaba',
    'amazonaws',
    'googlebot',
    'baiduspider',
    'censys',
    'shodan',
    'shadowserver'
  ];

  function isBotOrg(org) {
    if (!org) return false;
    const lower = org.toLowerCase();
    return BOT_ORGS.some(name => lower.includes(name));
  }

  function logToGoogle(visitorData) {
    fetch('https://script.google.com/macros/s/AKfycbxmocg5FiFwS9LYsXNMQuBzRHM1iHgqYBigmyQ3uaI3JpVrIAo2KdlddGvUzoWa1WN_/exec', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(visitorData)
    });
  }

  function runTracking() {
    if (window.hasTracked) return;
    window.hasTracked = true;

    fetch('https://ipapi.co/json/')
      .then(res => res.ok ? res.json() : null)
      .then(data => {
        if (data && !data.error && data.ip) {

          // --- Bot IP / Org filter: silently drop, do not log ---
          if (isBotIP(data.ip) || isBotOrg(data.org)) return;

          logToGoogle({
            ip: data.ip,
            country: data.country_name || "Unknown",
            city: data.city || "Unknown",
            userAgent: userAgent,
            referrer: referrer,
            page: path
          });

        } else {
          logToGoogle({
            ip: "Lookup Failed",
            country: "Lookup Failed",
            city: "Lookup Failed",
            userAgent: userAgent,
            referrer: referrer,
            page: path
          });
        }
      })
      .catch(() => {
        logToGoogle({
          ip: "Blocked",
          country: "Blocked",
          city: "Blocked",
          userAgent: userAgent,
          referrer: referrer,
          page: path
        });
      });
  }

  const activityEvents = ['mousedown', 'mousemove', 'keydown', 'scroll', 'touchstart'];

  function triggerListener() {
    runTracking();
    activityEvents.forEach(e => window.removeEventListener(e, triggerListener));
  }

  activityEvents.forEach(e =>
    window.addEventListener(e, triggerListener, { passive: true })
  );

  setTimeout(runTracking, 5000);
})();
</script>
</head>
<body>
  {% include browser-upgrade.html %}
  {% include masthead.html %}
  {{ content }}
  <div class="page__footer">
    <footer>
      {% include footer/custom.html %}
      {% include footer.html %}
    </footer>
  </div>
  {% include scripts.html %}
</body>
</html>
