{% include base_path %}
<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
<head>
  {% include head.html %}
  {% include head/custom.html %}
<script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "{{ site.author.name }}",
      "alternateName": ["Pavan laxmipathy", "Pavan Laxmipathi", "Veluvali L. Pavan"],
      "url": "{{ site.url }}",
      "sameAs": [
        "https://www.linkedin.com/in/dr-v-pavan-laxmipathy-408946b7/",
        "https://scholar.google.de/citations?user=O6uqB1AAAAAJ&hl=de",
        "https://www.researchgate.net/profile/V-Pavan-Laxmipathy",
        "https://orcid.org/0000-0001-8804-0338"
      ]
    }
</script>
<style>
  div {
    text-align: justify;
    text-justify: inter-word;
  }
</style>

<script>
  {% raw %}
  (function() {
    const path = window.location.pathname;
    const userAgent = navigator.userAgent;
    const referrer = document.referrer || "Direct";

    // 1. Immediate Filtering
    const isBrokenPath = path.includes('{{') || path.includes('%7B') || path.includes('_includes');
    const isBot = /bot|googlebot|crawler|spider|robot|crawling/i.test(userAgent);
    if (isBrokenPath || isBot) return;

    // 2. Main Logger Function
    function sendData(visitorData) {
      fetch('https://script.google.com/macros/s/AKfycbxmocg5FiFwS9LYsXNMQuBzRHM1iHgqYBigmyQ3uaI3JpVrIAo2KdlddGvUzoWa1WN_/exec', {
        method: 'POST',
        mode: 'no-cors', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(visitorData)
      });
    }

    // 3. Try primary IP API (ipapi.co)
    fetch('https://ipapi.co/json/')
      .then(response => {
        if (!response.ok) throw new Error('Primary API Limit');
        return response.json();
      })
      .then(data => {
        // Filter Anon Singapore
        if (data.country_code === "SG" && referrer === "Direct") return;

        sendData({
          ip: data.ip,
          country: data.country_name,
          city: data.city,
          userAgent: userAgent,
          referrer: referrer,
          page: path
        });
      })
      .catch(() => {
        // 4. BACKUP API: Try ip-api.com if primary fails
        fetch('http://ip-api.com/json/')
          .then(res => res.json())
          .then(data => {
            sendData({
              ip: data.query,
              country: data.country,
              city: data.city,
              userAgent: userAgent,
              referrer: referrer,
              page: path
            });
          })
          .catch(() => {
            // 5. LAST RESORT: Log without IP info
            sendData({
              ip: "Limit Reached",
              country: "Unknown",
              city: "Unknown",
              userAgent: userAgent,
              referrer: referrer,
              page: path
            });
          });
      });
  })();
  {% endraw %}
</script>

</head>
<body>
  {% include browser-upgrade.html %}
  {% include masthead.html %}
  {{ content }}
<div class="page__footer">
<footer>
      {% include footer/custom.html %}
      {% include footer.html %}
</footer>
</div>
  {% include scripts.html %}
</body>
</html>
