<script>
  {% raw %}
  (function() {
    const path = window.location.pathname;
    const userAgent = navigator.userAgent;
    const referrer = document.referrer || "Direct";

    // 1. STRICT LOCALHOST & BOT FILTER
    // This stops the script completely if you are on localhost or a bot
    const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    const isInternal = path.includes('_includes') || path.includes('_sass') || path.includes('_layouts');
    const isBot = /bot|googlebot|crawler|spider|robot|crawling|headless/i.test(userAgent);
    
    if (isLocal || isInternal || isBot) {
      console.log("Tracking skipped: Localhost or Bot detected.");
      return; 
    }

    // 2. DATA SENDER
    function logToGoogle(visitorData) {
      fetch('https://script.google.com/macros/s/AKfycbxmocg5FiFwS9LYsXNMQuBzRHM1iHgqYBigmyQ3uaI3JpVrIAo2KdlddGvUzoWa1WN_/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(visitorData)
      });
    }

    // 3. DIRECT FETCH (Cache removed as requested)
    fetch('https://ipapi.co/json/')
      .then(res => {
        if (!res.ok) throw new Error('API Limit');
        return res.json();
      })
      .then(data => {
        // Filter specific unwanted regions (like Anon Singapore)
        if (data.country_code === "SG" && referrer === "Direct") return;

        logToGoogle({
          ip: data.ip,
          country: data.country_name,
          city: data.city,
          userAgent: userAgent,
          referrer: referrer,
          page: path
        });
      })
      .catch(() => {
        // FALLBACK: If API is rate-limited, log the visit without the IP
        logToGoogle({
          ip: "API Limit Reached",
          country: "Unknown",
          city: "Unknown",
          userAgent: userAgent,
          referrer: referrer,
          page: path
        });
      });
  })();
  {% endraw %}
</script>
