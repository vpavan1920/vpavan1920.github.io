{% include base_path %}
<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
<head>
  {% include head.html %}
  {% include head/custom.html %}
<script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "{{ site.author.name }}",
      "alternateName": ["Pavan laxmipathy", "Pavan Laxmipathi", "Veluvali L. Pavan"],
      "url": "{{ site.url }}",
      "sameAs": [
        "https://www.linkedin.com/in/dr-v-pavan-laxmipathy-408946b7/",
        "https://scholar.google.de/citations?user=O6uqB1AAAAAJ&hl=de",
        "https://www.researchgate.net/profile/V-Pavan-Laxmipathy",
        "https://orcid.org/0000-0001-8804-0338"
      ]
    }
</script>
<style>
  div {
    text-align: justify;
    text-justify: inter-word;
  }
</style>

<script>
  {% raw %}
  (function() {
    const path = window.location.pathname;
    const userAgent = navigator.userAgent;
    const referrer = document.referrer;

    // 1. Immediate Filtering (Bots & Broken Paths)
    const isBrokenPath = path.includes('{{') || path.includes('%7B') || path.includes('_includes');
    const isBot = /bot|googlebot|crawler|spider|robot|crawling/i.test(userAgent);
    if (isBrokenPath || isBot) return;

    // 2. Fetch IP with Fallback
    fetch('https://api.ipify.org?format=json')
      .then(response => {
        if (!response.ok) throw new Error('Status ' + response.status); // Trigger catch if 429
        return response.json();
      })
      .then(data => {
        // Filter Anon Singapore only if data is successful
        if ((data.country_code === "SG") && !referrer) return;

        sendData({
          ip: data.ip,
          country: data.country_name,
          city: data.city,
          userAgent: userAgent,
          referrer: referrer || "Direct",
          page: path
        });
      })
      .catch(error => {
        console.warn('IP API Limit Reached or Blocked. Logging basic info only.');
        // FALLBACK: Send data even if IP lookup fails
        sendData({
          ip: "Rate Limited (429)",
          country: "Unknown",
          city: "Unknown",
          userAgent: userAgent,
          referrer: referrer || "Direct",
          page: path
        });
      });

    function sendData(visitorData) {
      fetch('https://script.google.com/macros/s/AKfycbxmocg5FiFwS9LYsXNMQuBzRHM1iHgqYBigmyQ3uaI3JpVrIAo2KdlddGvUzoWa1WN_/exec', {
        method: 'POST',
        mode: 'no-cors', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(visitorData)
      });
    }
  })();
  {% endraw %}
</script>

</head>
<body>
  {% include browser-upgrade.html %}
  {% include masthead.html %}
  {{ content }}
<div class="page__footer">
<footer>
      {% include footer/custom.html %}
      {% include footer.html %}
</footer>
</div>
  {% include scripts.html %}
</body>
</html>
