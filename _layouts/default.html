{% include base_path %}
<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
<head>
  {% include head.html %}
  {% include head/custom.html %}

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Pavan Laxmipathy Veluvali",
    "alternateName": [
      "V. Pavan Laxmipathy",
      "V Pavan Laxmipathy",
      "Pavan Laxmipathy",
      "Veluvali L. Pavan",
      "Pavan Veluvali"
    ],
    "url": "https://vpavan1920.github.io",
    "jobTitle": "Computational Materials Scientist",
    "affiliation": "Max Planck Institute for Dynamics of Complex Technical Systems"
  }
<script>
(function() {
  const path = window.location.pathname;
  const userAgent = navigator.userAgent;
  const referrer = document.referrer || "Direct";

  const isLocal =
    window.location.hostname === "localhost" ||
    window.location.hostname === "127.0.0.1";

  const isInternal =
    path.includes('_includes') ||
    path.includes('_sass') ||
    path.includes('_layouts');

  // --- Advanced Bot Detection ---
  const uaBotPattern = /bot|googlebot|crawler|spider|robot|crawling|headless|scrapy|curl|wget/i.test(userAgent);
  const isHeadless = navigator.webdriver === true;
  const noPlugins = navigator.plugins.length === 0;
  const noLanguages = !navigator.languages || navigator.languages.length === 0;

  if (isLocal || isInternal || uaBotPattern || isHeadless || noLanguages) return;

  function logToGoogle(visitorData) {
    fetch('https://script.google.com/macros/s/AKfycbxmocg5FiFwS9LYsXNMQuBzRHM1iHgqYBigmyQ3uaI3JpVrIAo2KdlddGvUzoWa1WN_/exec', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(visitorData)
    });
  }

  let interacted = false;

  const interactionEvents = ['mousedown', 'keydown', 'touchstart'];

  interactionEvents.forEach(event =>
    window.addEventListener(event, () => {
      interacted = true;
      runTracking();
    }, { once: true, passive: true })
  );

  function runTracking() {
    if (window.hasTracked || !interacted) return;
    window.hasTracked = true;

    fetch('https://ipapi.co/json/')
      .then(res => res.ok ? res.json() : null)
      .then(data => {

        if (data && !data.error && data.ip) {
          logToGoogle({
            ip: data.ip,
            country: data.country_name || "Unknown",
            city: data.city || "Unknown",
            userAgent: userAgent,
            referrer: referrer,
            page: path
          });
        } else {
          logToGoogle({
            ip: "Geo Failed",
            country: "Geo Failed",
            city: "Geo Failed",
            userAgent: userAgent,
            referrer: referrer,
            page: path
          });
        }
      })
      .catch(() => {
        logToGoogle({
          ip: "Blocked",
          country: "Blocked",
          city: "Blocked",
          userAgent: userAgent,
          referrer: referrer,
          page: path
        });
      });
  }

})();
</script>


</head>

  </div>

</body>
</html>
