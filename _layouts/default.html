<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
<head>
  {% include head.html %}
  {% include head/custom.html %}

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Pavan Laxmipathy Veluvali",
    "alternateName": [
      "V. Pavan Laxmipathy",
      "V Pavan Laxmipathy",
      "Pavan Laxmipathy",
      "Veluvali L. Pavan",
      "Pavan Veluvali"
    ],
    "url": "https://vpavan1920.github.io",
    "jobTitle": "Computational Materials Scientist",
    "affiliation": "Max Planck Institute for Dynamics of Complex Technical Systems"
  }
  </script>

  <style>
    div {
      text-align: justify;
      text-justify: inter-word;
    }
  </style>

<script>
  {% raw %}
  (function() {
    const path = window.location.pathname;
    const userAgent = navigator.userAgent;
    const referrer = document.referrer || "Direct";

    // 1. FILTERING
    const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    const isInternal = path.includes('_includes') || path.includes('_sass') || path.includes('_layouts');
    const isBot = /bot|googlebot|crawler|spider|robot|crawling|headless/i.test(userAgent);
    
    if (isLocal || isInternal || isBot) return;

    function logToGoogle(visitorData) {
      fetch('https://script.google.com/macros/s/AKfycbxmocg5FiFwS9LYsXNMQuBzRHM1iHgqYBigmyQ3uaI3JpVrIAo2KdlddGvUzoWa1WN_/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(visitorData)
      });
    }

    function runTracking() {
      if (window.hasTracked) return;
      window.hasTracked = true;

      const cachedIP = sessionStorage.getItem('v_ip');
      const cachedCountry = sessionStorage.getItem('v_country');
      const cachedCity = sessionStorage.getItem('v_city');

      if (cachedIP) {
        // Use cached data
        logToGoogle({
          ip: cachedIP,
          country: cachedCountry,
          city: cachedCity,
          userAgent: userAgent,
          referrer: referrer,
          page: path
        });
      } else {
        // Fetch from a CORS-friendly API
        fetch('https://ipwhois.app/json/')
          .then(res => res.json())
          .then(data => {
            // Optional: skip specific visitors
            if (data.country_code === "SG" && referrer === "Direct") return;

            // Cache in session
            sessionStorage.setItem('v_ip', data.ip || 'Unknown');
            sessionStorage.setItem('v_country', data.country || 'Unknown');
            sessionStorage.setItem('v_city', data.city || 'Unknown');

            logToGoogle({
              ip: data.ip || 'Unknown',
              country: data.country || 'Unknown',
              city: data.city || 'Unknown',
              userAgent: userAgent,
              referrer: referrer,
              page: path
            });
          })
          .catch(err => {
            // Still log failure, but more graceful
            console.warn('IP fetch failed:', err);
            logToGoogle({
              ip: "Unknown",
              country: "Unknown",
              city: "Unknown",
              userAgent: userAgent,
              referrer: referrer,
              page: path
            });
          });
      }
    }

    // Trigger only on human interaction
    const activityEvents = ['mousedown', 'mousemove', 'keydown', 'scroll', 'touchstart'];
    function triggerListener() {
      runTracking();
      activityEvents.forEach(e => window.removeEventListener(e, triggerListener));
    }
    activityEvents.forEach(e => window.addEventListener(e, triggerListener, { passive: true }));

    // Fallback after 5 seconds
    setTimeout(runTracking, 5000);

  })();
  {% endraw %}
</script>

</head>

<body>
  {% include browser-upgrade.html %}
  {% include masthead.html %}

  {{ content }}

  <div class="page__footer">
    <footer>
      {% include footer/custom.html %}
      {% include footer.html %}
    </footer>
  </div>

  {% include scripts.html %}
</body>
</html>
